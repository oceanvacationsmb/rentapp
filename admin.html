<!DOCTYPE html>
<html>
<head>
  <title>Rental Application Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family:Arial;
      background:#f4f4f4;
      padding:20px;
    }

    .box{
      max-width:1000px;
      margin:auto;
      background:white;
      padding:25px;
      border-radius:10px;
      box-shadow:0 0 10px #ccc;
      margin-bottom:25px;
    }

    h2,h3{
      margin-top:0;
    }

    label{
      font-weight:bold;
      display:block;
      margin-top:12px;
    }

    input,select,textarea{
      width:100%;
      padding:10px;
      margin-top:5px;
      border-radius:6px;
      border:1px solid #ccc;
      box-sizing:border-box;
    }

    button{
      padding:12px;
      background:#0077cc;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
      margin-top:12px;
      font-size:15px;
    }

    .danger{background:#c62828;}
    .gray{background:#777;}
    .green{background:#2e7d32;}

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
    }

    .card{
      border:1px solid #ccc;
      background:#fafafa;
      padding:15px;
      border-radius:8px;
      margin-top:15px;
    }

    .hidden{display:none;}

    .result{
      background:#f1f1f1;
      padding:15px;
      border-radius:8px;
      margin-top:20px;
    }

    .success-message{
      color:green;
      font-weight:bold;
      margin-top:10px;
    }

    .error-message{
      color:red;
      font-weight:bold;
      margin-top:10px;
    }

    textarea.message{
      height:180px;
    }

    @media(max-width:700px){
      .row{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

<div class="box" id="loginBox">
  <h2>Admin Login</h2>

  <label>Password</label>
  <input type="password" id="adminPassword">

  <button onclick="login()">Login</button>
</div>

<div id="adminArea" class="hidden">

  <div class="box">
    <h2>Rental Application Dashboard</h2>

    <button onclick="showAddProperty()">Add New Property</button>
    <button class="gray" onclick="loadProperties()">Refresh Properties</button>
  </div>

  <div class="box hidden" id="propertyFormBox">
    <h3 id="propertyFormTitle">Add Property</h3>

    <input type="hidden" id="propertyId">

    <div class="row">
      <div>
        <label>Property Name</label>
        <input type="text" id="propertyName">
      </div>

      <div>
        <label>Property Address</label>
        <input type="text" id="address">
      </div>
    </div>

    <div class="row">
      <div>
        <label>Default Rent</label>
        <input type="text" id="defaultRent">
      </div>

      <div>
        <label>Default Deposit</label>
        <input type="text" id="defaultDeposit">
      </div>
    </div>

    <label>Available Date</label>
    <input type="date" id="defaultAvailableDate">

    <label>Pets Allowed</label>
    <select id="defaultPetsAllowed" onchange="togglePetDeposit()">
      <option>No</option>
      <option>Yes</option>
      <option>Subject To Approval</option>
    </select>

    <div id="petDepositBox">
      <label>Pet Deposit / Pet Rent</label>
      <input type="text" id="defaultPetDeposit">
    </div>

    <label>Notes</label>
    <textarea id="notes" rows="4"></textarea>

    <button onclick="saveProperty()">Save Property</button>
    <button class="gray" onclick="cancelPropertyForm()">Cancel</button>
  </div>

  <div class="box">
    <h3>Choose Saved Property</h3>

    <label>Property</label>
    <select id="propertyDropdown" onchange="choosePropertyFromDropdown()">
      <option value="">Select property</option>
    </select>

    <div id="selectedPropertyPreview" class="card hidden"></div>
  </div>

  <div class="box hidden" id="tenantBox">
    <h3>Tenant Application Invite</h3>

    <input type="hidden" id="selectedPropertyId">

    <label>Selected Property</label>
    <input type="text" id="selectedPropertyName" readonly>

    <label>Tenant Email</label>
    <input type="email" id="tenantEmail" placeholder="tenant@email.com">

    <div class="row">
      <div>
        <label>Rent</label>
        <input type="text" id="appRent">
      </div>

      <div>
        <label>Deposit</label>
        <input type="text" id="appDeposit">
      </div>
    </div>

    <label>Available Date</label>
    <input type="date" id="appAvailableDate" readonly>

    <div id="appPetsSection">
      <label>Pets Allowed</label>
      <select id="appPetsAllowed" onchange="toggleAppPetDeposit()">
        <option>No</option>
        <option>Yes</option>
        <option>Subject To Approval</option>
      </select>

      <div id="appPetDepositBox">
        <label>Pet Deposit / Pet Rent</label>
        <input type="text" id="appPetDeposit">
      </div>
    </div>

    <label>Notes</label>
    <textarea id="appNotes" rows="4"></textarea>

    <button class="green" onclick="createApplicationLink(event)">Generate Message</button>

    <button id="inviteButton" class="gray hidden" onclick="openGmailInvite()">Invite To Apply</button>

    <div id="statusMessage"></div>

    <div class="result hidden" id="linkResult">
      <h3>Application Link Created</h3>

      <p><b>Code:</b></p>
      <div id="generatedCode"></div>

      <p><b>Link:</b></p>
      <div id="generatedLink"></div>

      <button onclick="copyLink()">Copy Link</button>

      <p><b>Message:</b></p>
      <textarea id="tenantMessage" class="message" readonly></textarea>

      <button onclick="copyMessage()">Copy Message</button>
    </div>
  </div>

</div>

<script>
const API_BASE = "https://rentapp-0jgt.onrender.com";

let adminPassword = "";
let properties = [];
let lastGeneratedLink = "";

function login(){
  adminPassword = document.getElementById("adminPassword").value;

  if(!adminPassword){
    showStatus("Enter password", "error");
    return;
  }

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("adminArea").classList.remove("hidden");

  loadProperties();
}

async function api(path, options = {}){
  const response = await fetch(API_BASE + path, {
    method: options.method || "GET",
    headers:{
      "Content-Type":"application/json",
      "x-admin-password":adminPassword
    },
    body: options.body || null
  });

  const data = await response.json();

  if(!data.success){
    throw new Error(data.error || "API Error");
  }

  return data;
}

function showStatus(message, type){
  const box = document.getElementById("statusMessage");

  if(!box){
    return;
  }

  box.innerHTML =
    `<p class="${type === "error" ? "error-message" : "success-message"}">${message}</p>`;
}

function togglePetDeposit(){
  const petsAllowed = document.getElementById("defaultPetsAllowed").value;
  const box = document.getElementById("petDepositBox");

  if(petsAllowed === "No"){
    box.style.display = "none";
    document.getElementById("defaultPetDeposit").value = "";
  }else{
    box.style.display = "block";
  }
}

function toggleAppPetDeposit(){
  const petsAllowed = document.getElementById("appPetsAllowed").value;
  const box = document.getElementById("appPetDepositBox");

  if(petsAllowed === "No"){
    box.style.display = "none";
    document.getElementById("appPetDeposit").value = "";
  }else{
    box.style.display = "block";
  }
}

function showAddProperty(){
  document.getElementById("propertyFormBox").classList.remove("hidden");
  document.getElementById("propertyFormTitle").innerText = "Add Property";

  document.getElementById("propertyId").value = "";
  document.getElementById("propertyName").value = "";
  document.getElementById("address").value = "";
  document.getElementById("defaultRent").value = "";
  document.getElementById("defaultDeposit").value = "";
  document.getElementById("defaultAvailableDate").value = "";
  document.getElementById("defaultPetsAllowed").value = "No";
  document.getElementById("defaultPetDeposit").value = "";
  document.getElementById("notes").value = "";

  togglePetDeposit();
}

function cancelPropertyForm(){
  document.getElementById("propertyFormBox").classList.add("hidden");
}

async function loadProperties(){
  try{
    const data = await api("/api/properties");
    properties = data.properties || [];
    renderPropertyDropdown();
  }catch(error){
    showStatus("Could not load properties. Check admin password or backend.", "error");
  }
}

function renderPropertyDropdown(){
  const dropdown = document.getElementById("propertyDropdown");

  dropdown.innerHTML = `<option value="">Select property</option>`;

  properties.forEach(property => {
    const option = document.createElement("option");
    option.value = property.id;
    option.textContent = `${property.propertyName || "No Name"} - ${property.address || ""}`;
    dropdown.appendChild(option);
  });
}

function choosePropertyFromDropdown(){
  const id = document.getElementById("propertyDropdown").value;

  if(!id){
    document.getElementById("selectedPropertyPreview").classList.add("hidden");
    document.getElementById("tenantBox").classList.add("hidden");
    return;
  }

  selectProperty(id);
}

async function saveProperty(){
  const id = document.getElementById("propertyId").value;
  const petsAllowed = document.getElementById("defaultPetsAllowed").value;

  const body = {
    propertyName: document.getElementById("propertyName").value,
    address: document.getElementById("address").value,
    defaultRent: document.getElementById("defaultRent").value,
    defaultDeposit: document.getElementById("defaultDeposit").value,
    defaultAvailableDate: document.getElementById("defaultAvailableDate").value,
    defaultPetsAllowed: petsAllowed,
    defaultPetDeposit: petsAllowed === "No" ? "" : document.getElementById("defaultPetDeposit").value,
    notes: document.getElementById("notes").value
  };

  if(!body.propertyName){
    showStatus("Property name required", "error");
    return;
  }

  try{
    if(id){
      await api("/api/properties/" + id, {
        method:"PUT",
        body:JSON.stringify(body)
      });
    }else{
      await api("/api/properties", {
        method:"POST",
        body:JSON.stringify(body)
      });
    }

    cancelPropertyForm();
    await loadProperties();
    showStatus("Property saved.", "success");
  }catch(error){
    showStatus("Failed to save property.", "error");
  }
}

function editPropertyFromSelected(){
  const id = document.getElementById("propertyDropdown").value;

  if(!id){
    showStatus("Select a property first.", "error");
    return;
  }

  const property = properties.find(p => p.id === id);

  if(!property){
    return;
  }

  document.getElementById("propertyFormBox").classList.remove("hidden");
  document.getElementById("propertyFormTitle").innerText = "Edit Property";

  document.getElementById("propertyId").value = property.id;
  document.getElementById("propertyName").value = property.propertyName || "";
  document.getElementById("address").value = property.address || "";
  document.getElementById("defaultRent").value = property.defaultRent || "";
  document.getElementById("defaultDeposit").value = property.defaultDeposit || "";
  document.getElementById("defaultAvailableDate").value = property.defaultAvailableDate || "";
  document.getElementById("defaultPetsAllowed").value = property.defaultPetsAllowed || "No";
  document.getElementById("defaultPetDeposit").value = property.defaultPetDeposit || "";
  document.getElementById("notes").value = property.notes || "";

  togglePetDeposit();
}

async function deleteSelectedProperty(){
  const id = document.getElementById("propertyDropdown").value;

  if(!id){
    showStatus("Select a property first.", "error");
    return;
  }

  if(!confirm("Delete selected property?")){
    return;
  }

  try{
    await api("/api/properties/" + id, {
      method:"DELETE"
    });

    document.getElementById("selectedPropertyPreview").classList.add("hidden");
    document.getElementById("tenantBox").classList.add("hidden");

    await loadProperties();
    showStatus("Property deleted.", "success");
  }catch(error){
    showStatus("Failed to delete property.", "error");
  }
}

function selectProperty(id){
  const property = properties.find(p => p.id === id);

  if(!property) return;

  document.getElementById("propertyDropdown").value = id;
  document.getElementById("tenantBox").classList.remove("hidden");

  document.getElementById("selectedPropertyId").value = property.id;
  document.getElementById("selectedPropertyName").value = property.propertyName || "";
  document.getElementById("appRent").value = property.defaultRent || "";
  document.getElementById("appDeposit").value = property.defaultDeposit || "";
  document.getElementById("appAvailableDate").value = property.defaultAvailableDate || "";
  document.getElementById("appNotes").value = property.notes || "";
  document.getElementById("tenantEmail").value = "";
  document.getElementById("linkResult").classList.add("hidden");
  document.getElementById("inviteButton").classList.add("hidden");
  document.getElementById("statusMessage").innerHTML = "";

  const preview = document.getElementById("selectedPropertyPreview");

  preview.innerHTML = `
    <h3>Selected Property</h3>
    <p><b>Property:</b> ${property.propertyName || ""}</p>
    <p><b>Address:</b> ${property.address || ""}</p>
    <p><b>Rent:</b> $${property.defaultRent || ""}</p>
    <p><b>Deposit:</b> $${property.defaultDeposit || ""}</p>
    <p><b>Available:</b> ${property.defaultAvailableDate || ""}</p>
    <p><b>Pets:</b> ${property.defaultPetsAllowed || "No"}</p>
    ${property.defaultPetsAllowed !== "No" ? `<p><b>Pet Deposit / Rent:</b> ${property.defaultPetDeposit || ""}</p>` : ""}
    <button class="gray" onclick="editPropertyFromSelected()">Edit Selected Property</button>
    <button class="danger" onclick="deleteSelectedProperty()">Delete Selected Property</button>
  `;

  preview.classList.remove("hidden");

  if((property.defaultPetsAllowed || "No") === "No"){
    document.getElementById("appPetsSection").style.display = "none";
    document.getElementById("appPetsAllowed").value = "No";
    document.getElementById("appPetDeposit").value = "";
  }else{
    document.getElementById("appPetsSection").style.display = "block";
    document.getElementById("appPetsAllowed").value = property.defaultPetsAllowed || "No";
    document.getElementById("appPetDeposit").value = property.defaultPetDeposit || "";
    toggleAppPetDeposit();
  }

  document.getElementById("tenantBox").scrollIntoView({ behavior:"smooth" });
}

async function createApplicationLink(event){
  const button = event.target;

  const propertyId = document.getElementById("selectedPropertyId").value;
  const property = properties.find(p => p.id === propertyId);

  if(!property){
    showStatus("Select property first.", "error");
    return;
  }

  const tenantEmail = document.getElementById("tenantEmail").value;
  const petsAllowed = property.defaultPetsAllowed || "No";

  const body = {
    propertyId: property.id,
    propertyName: property.propertyName,
    address: property.address,
    tenantEmail: tenantEmail,
    rent: document.getElementById("appRent").value,
    availableDate: property.defaultAvailableDate || "",
    deposit: document.getElementById("appDeposit").value,
    petsAllowed: petsAllowed,
    petDeposit: petsAllowed === "No" ? "" : document.getElementById("appPetDeposit").value,
    notes: document.getElementById("appNotes").value
  };

  try {
    button.disabled = true;
    button.innerText = "Generating...";

    const data = await api("/api/application-links", {
      method:"POST",
      body:JSON.stringify(body)
    });

    const application = data.application;

    lastGeneratedLink =
      "https://oceanvacationsmb.github.io/rentapp/apply.html?code=" +
      application.code;

    document.getElementById("linkResult").classList.remove("hidden");
    document.getElementById("generatedCode").innerText = application.code;

    document.getElementById("generatedLink").innerHTML =
      `<a href="${lastGeneratedLink}" target="_blank">${lastGeneratedLink}</a>`;

    let petText = "";

    if(application.petsAllowed !== "No"){
      petText =
`Pets:
${application.petsAllowed}

Pet Deposit / Pet Rent:
${application.petDeposit || "N/A"}

`;
    }

    document.getElementById("tenantMessage").value =
`Hi,

Please complete the rental application using this link:

${lastGeneratedLink}

Address:
${application.address}

Rent:
$${application.rent}

Available Date:
${application.availableDate || "N/A"}

Security Deposit:
$${application.deposit}

${petText}Thank you`;

    document.getElementById("inviteButton").classList.remove("hidden");

    showStatus("Message generated. Click Invite To Apply to open Gmail.", "success");

  } catch(error) {
    showStatus("Failed to create application link.", "error");
  }

  button.disabled = false;
  button.innerText = "Generate Message";
}

function openGmailInvite(){
  const tenantEmail = document.getElementById("tenantEmail").value;

  if(!tenantEmail){
    showStatus("Tenant email is required before opening Gmail.", "error");
    return;
  }

  const subject = encodeURIComponent("Rental Application");

  const body = encodeURIComponent(
    document.getElementById("tenantMessage").value
  );

  const gmailUrl =
    `https://mail.google.com/mail/?view=cm&fs=1&to=${tenantEmail}&su=${subject}&body=${body}`;

  window.open(gmailUrl, "_blank");

  showStatus("Gmail opened. Review and click Send.", "success");
}

function copyLink(){
  navigator.clipboard.writeText(lastGeneratedLink);
  showStatus("Link copied.", "success");
}

function copyMessage(){
  const message = document.getElementById("tenantMessage").value;
  navigator.clipboard.writeText(message);
  showStatus("Message copied.", "success");
}
</script>

</body>
</html>
