<script>

const API_BASE =
  "https://rentapp-0jgt.onrender.com";

let adminPassword = "";
let properties = [];
let lastGeneratedLink = "";

function login() {

  adminPassword =
    document.getElementById("adminPassword").value;

  if (!adminPassword) {
    alert("Enter admin password");
    return;
  }

  document.getElementById("loginBox")
    .classList.add("hidden");

  document.getElementById("adminArea")
    .classList.remove("hidden");

  loadProperties();
}

async function api(path, options = {}) {

  const response = await fetch(
    "https://rentapp-0jgt.onrender.com" + path,
    {
      method: options.method || "GET",

      headers: {
        "Content-Type": "application/json",
        "x-admin-password": adminPassword
      },

      body: options.body || null
    }
  );

  const data = await response.json();

  console.log(data);

  if (!data.success) {

    alert(data.error || "API Error");

    throw new Error(data.error || "API Error");
  }

  return data;
}

function showAddProperty() {

  document.getElementById("propertyFormTitle")
    .innerText = "Add Property";

  document.getElementById("propertyId").value = "";
  document.getElementById("propertyName").value = "";
  document.getElementById("address").value = "";
  document.getElementById("defaultRent").value = "";
  document.getElementById("defaultDeposit").value = "";
  document.getElementById("defaultApplicationFee").value = "";
  document.getElementById("defaultPetsAllowed").value = "No";
  document.getElementById("defaultPetDeposit").value = "";
  document.getElementById("notes").value = "";

  document.getElementById("propertyFormBox")
    .classList.remove("hidden");
}

function cancelPropertyForm() {

  document.getElementById("propertyFormBox")
    .classList.add("hidden");
}

async function loadProperties() {

  const data =
    await api("/api/properties");

  properties = data.properties;

  renderProperties();
}

function renderProperties() {

  const list =
    document.getElementById("propertiesList");

  list.innerHTML = "";

  if (properties.length === 0) {

    list.innerHTML =
      "<p>No properties added yet.</p>";

    return;
  }

  properties.forEach(property => {

    const div =
      document.createElement("div");

    div.className = "card";

    div.innerHTML = `

      <h3>${property.propertyName || "No Name"}</h3>

      <p><b>Address:</b>
      ${property.address || ""}</p>

      <p><b>Rent:</b>
      ${property.defaultRent || ""}</p>

      <p><b>Deposit:</b>
      ${property.defaultDeposit || ""}</p>

      <p><b>Application Fee:</b>
      ${property.defaultApplicationFee || ""}</p>

      <p><b>Pets:</b>
      ${property.defaultPetsAllowed || "No"}</p>

      <p><b>Pet Deposit / Rent:</b>
      ${property.defaultPetDeposit || ""}</p>

      <p><b>Notes:</b>
      ${property.notes || ""}</p>

      <button onclick="selectProperty('${property.id}')">
        Create Application Link
      </button>

      <button class="gray"
        onclick="editProperty('${property.id}')">
        Edit
      </button>

      <button class="danger"
        onclick="deleteProperty('${property.id}')">
        Delete
      </button>
    `;

    list.appendChild(div);
  });
}

async function saveProperty() {

  const id =
    document.getElementById("propertyId").value;

  const body = {

    propertyName:
      document.getElementById("propertyName").value,

    address:
      document.getElementById("address").value,

    defaultRent:
      document.getElementById("defaultRent").value,

    defaultDeposit:
      document.getElementById("defaultDeposit").value,

    defaultApplicationFee:
      document.getElementById("defaultApplicationFee").value,

    defaultPetsAllowed:
      document.getElementById("defaultPetsAllowed").value,

    defaultPetDeposit:
      document.getElementById("defaultPetDeposit").value,

    notes:
      document.getElementById("notes").value
  };

  if (!body.propertyName) {

    alert("Property name is required");
    return;
  }

  if (id) {

    await api(
      "/api/properties/" + id,
      {
        method: "PUT",
        body: JSON.stringify(body)
      }
    );

  } else {

    await api(
      "/api/properties",
      {
        method: "POST",
        body: JSON.stringify(body)
      }
    );
  }

  cancelPropertyForm();

  loadProperties();
}

function editProperty(id) {

  const property =
    properties.find(p => p.id === id);

  if (!property) return;

  document.getElementById("propertyFormTitle")
    .innerText = "Edit Property";

  document.getElementById("propertyId").value =
    property.id;

  document.getElementById("propertyName").value =
    property.propertyName || "";

  document.getElementById("address").value =
    property.address || "";

  document.getElementById("defaultRent").value =
    property.defaultRent || "";

  document.getElementById("defaultDeposit").value =
    property.defaultDeposit || "";

  document.getElementById("defaultApplicationFee").value =
    property.defaultApplicationFee || "";

  document.getElementById("defaultPetsAllowed").value =
    property.defaultPetsAllowed || "No";

  document.getElementById("defaultPetDeposit").value =
    property.defaultPetDeposit || "";

  document.getElementById("notes").value =
    property.notes || "";

  document.getElementById("propertyFormBox")
    .classList.remove("hidden");

  window.scrollTo(0,0);
}

async function deleteProperty(id) {

  if (!confirm("Delete this property?")) {
    return;
  }

  await api(
    "/api/properties/" + id,
    {
      method: "DELETE"
    }
  );

  loadProperties();
}

function selectProperty(id) {

  const property =
    properties.find(p => p.id === id);

  if (!property) return;

  document.getElementById("selectedPropertyId").value =
    property.id;

  document.getElementById("selectedPropertyName").value =
    property.propertyName || "";

  document.getElementById("appRent").value =
    property.defaultRent || "";

  document.getElementById("appDeposit").value =
    property.defaultDeposit || "";

  document.getElementById("appFee").value =
    property.defaultApplicationFee || "";

  document.getElementById("appPetsAllowed").value =
    property.defaultPetsAllowed || "No";

  document.getElementById("appPetDeposit").value =
    property.defaultPetDeposit || "";

  document.getElementById("appNotes").value =
    property.notes || "";

  document.getElementById("tenantEmail").value = "";

  document.getElementById("availableDate").value = "";

  document.getElementById("linkResult")
    .classList.add("hidden");

  document.getElementById("applicationBox")
    .classList.remove("hidden");

  document.getElementById("applicationBox")
    .scrollIntoView({ behavior: "smooth" });
}

async function createApplicationLink() {

  const propertyId =
    document.getElementById("selectedPropertyId").value;

  const property =
    properties.find(p => p.id === propertyId);

  if (!property) {

    alert("Select a property first");
    return;
  }

  const body = {

    propertyId: property.id,

    propertyName: property.propertyName,

    address: property.address,

    tenantEmail:
      document.getElementById("tenantEmail").value,

    rent:
      document.getElementById("appRent").value,

    availableDate:
      document.getElementById("availableDate").value,

    deposit:
      document.getElementById("appDeposit").value,

    applicationFee:
      document.getElementById("appFee").value,

    petsAllowed:
      document.getElementById("appPetsAllowed").value,

    petDeposit:
      document.getElementById("appPetDeposit").value,

    notes:
      document.getElementById("appNotes").value
  };

  const data =
    await api(
      "/api/application-links",
      {
        method: "POST",
        body: JSON.stringify(body)
      }
    );

  const application =
    data.application;

  lastGeneratedLink =
    "https://oceanvacationsmb.github.io/rentapp/apply.html?code=" +
    application.code;

  document.getElementById("linkResult")
    .classList.remove("hidden");

  document.getElementById("generatedCode")
    .innerText = application.code;

  document.getElementById("generatedLink")
    .innerHTML =
      `<a href="${lastGeneratedLink}" target="_blank">${lastGeneratedLink}</a>`;

  const message =

`Hi,

Please complete the rental application using this link:

${lastGeneratedLink}

Property:
${application.propertyName}

Address:
${application.address}

Rent:
$${application.rent}

Available Date:
${application.availableDate}

Security Deposit:
$${application.deposit}

Application Fee:
$${application.applicationFee}

Pets:
${application.petsAllowed}

Pet Deposit / Pet Rent:
${application.petDeposit || "N/A"}

Notes:
${application.notes || "N/A"}

Thank you`;

  document.getElementById("tenantMessage").value =
    message;
}

function copyLink() {

  navigator.clipboard.writeText(
    lastGeneratedLink
  );

  alert("Link copied");
}

function copyMessage() {

  const message =
    document.getElementById("tenantMessage").value;

  navigator.clipboard.writeText(message);

  alert("Message copied");
}

</script>
